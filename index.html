<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0f1e"/>
<title>TradeGuru AI</title>
<style>
:root{
  --bg:#0a0f1e;--card:#111827;--card2:#1a2235;--border:rgba(255,255,255,0.08);
  --green:#00e0aa;--green2:rgba(0,224,170,0.12);--red:#ff4060;--red2:rgba(255,64,96,0.12);
  --amber:#ffb020;--amber2:rgba(255,176,32,0.12);--blue:#4090ff;
  --text:#dce8f0;--text2:#6b7f96;--text3:#3a4a5a;
  --font:-apple-system,'Segoe UI',sans-serif;--mono:'JetBrains Mono','Courier New',monospace
}
body.light{
  --bg:#f0f4ff;--card:#fff;--card2:#e8eef8;--border:rgba(0,0,0,0.08);
  --green:#007755;--green2:rgba(0,119,85,0.1);--red:#cc2233;--red2:rgba(204,34,51,0.1);
  --amber:#aa6600;--amber2:rgba(170,102,0,0.1);--blue:#1144bb;
  --text:#111827;--text2:#4a5568;--text3:#9aa5b4
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.bot-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--green),#00b4d8);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bot-info{flex:1}
.bot-name{font-size:15px;font-weight:700;color:var(--text)}
.bot-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-btns{display:flex;gap:6px}
.hdr-btn{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;font-family:var(--font)}
.hdr-btn.active{background:var(--green2);color:var(--green);border-color:rgba(0,224,170,.3)}

/* MARKET STRIP */
.mstrip{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--card2)}
.mstrip::-webkit-scrollbar{display:none}
.mitem{flex:0 0 auto;padding:5px 12px;text-align:center;border-right:1px solid var(--border)}
.mitem-name{font-size:9px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.mitem-price{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text)}
.mitem-chg{font-size:10px;font-weight:700}
.up{color:var(--green)}.dn{color:var(--red)}

/* QUICK PROMPTS */
.quick-wrap{padding:8px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.quick-wrap::-webkit-scrollbar{display:none}
.qbtn{flex:0 0 auto;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--card);white-space:nowrap;font-family:var(--font);transition:all .2s}
.qbtn:active{background:var(--green2);color:var(--green);border-color:rgba(0,224,170,.3)}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.chat::-webkit-scrollbar{display:none}
.msg{display:flex;gap:8px;max-width:100%;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.msg-avatar.bot{background:linear-gradient(135deg,var(--green),#00b4d8)}
.msg-avatar.user{background:var(--blue);color:#fff;font-size:11px;font-weight:700}
.msg-bubble{max-width:82%;padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.65}
.msg.bot .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.msg.user .msg-bubble{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px;text-align:right}
.msg.bot .msg-time{text-align:left}

/* Message formatting */
.msg-bubble b{font-weight:700}
.msg-bubble .tag-buy{display:inline-block;padding:2px 8px;border-radius:4px;background:var(--green2);color:var(--green);font-weight:700;font-size:11px;font-family:var(--mono)}
.msg-bubble .tag-sell{display:inline-block;padding:2px 8px;border-radius:4px;background:var(--red2);color:var(--red);font-weight:700;font-size:11px;font-family:var(--mono)}
.msg-bubble .tag-hold{display:inline-block;padding:2px 8px;border-radius:4px;background:var(--amber2);color:var(--amber);font-weight:700;font-size:11px;font-family:var(--mono)}
.msg-bubble .price-box{background:var(--card2);border-radius:8px;padding:8px 10px;margin:6px 0;font-size:12px}
.msg-bubble .price-box .row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border)}
.msg-bubble .price-box .row:last-child{border:none}
.msg-bubble .price-box .lbl{color:var(--text2)}
.msg-bubble .price-box .val{font-family:var(--mono);font-weight:700}
.msg-bubble ul{padding-left:16px;margin:4px 0}
.msg-bubble li{margin-bottom:3px}
.msg-bubble .section-title{font-weight:700;color:var(--green);margin:8px 0 4px;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.msg-bubble .warn-inline{color:var(--red);font-weight:600}
.msg-bubble .good-inline{color:var(--green);font-weight:600}
.msg-bubble .amber-inline{color:var(--amber);font-weight:600}
.msg-bubble hr{border:none;border-top:1px solid var(--border);margin:8px 0}

/* TYPING */
.typing{display:flex;gap:4px;align-items:center;padding:8px 12px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--text2);animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* INPUT */
.input-wrap{flex-shrink:0;padding:10px 14px;border-top:1px solid var(--border);background:var(--bg);display:flex;gap:8px;align-items:flex-end}
.input-box{flex:1;min-height:42px;max-height:120px;padding:10px 13px;background:var(--card2);border:1px solid var(--border);border-radius:22px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;resize:none;line-height:1.4;transition:border .2s}
.input-box:focus{border-color:var(--green)}
.input-box::placeholder{color:var(--text3)}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.send-btn:active{transform:scale(.92)}
.send-btn svg{width:18px;height:18px}
.mic-btn{width:42px;height:42px;border-radius:50%;background:var(--card2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}

/* THEME TOGGLE */
.theme-btn{background:transparent;border:none;cursor:pointer;font-size:18px;padding:4px}

/* DISCLAIMER */
.disclaimer{font-size:10px;color:var(--text3);text-align:center;padding:3px 14px;flex-shrink:0}
</style>
</head>
<body>

<div class="hdr">
  <div class="bot-avatar">🤖</div>
  <div class="bot-info">
    <div class="bot-name">TradeGuru AI</div>
    <div class="bot-status"><div class="status-dot"></div><span id="statusTxt">Ready to help</span></div>
  </div>
  <div class="hdr-btns">
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="hdr-btn active" id="liveBtn" onclick="refreshPrices()">🔄 Live</button>
  </div>
</div>

<!-- LIVE MARKET STRIP -->
<div class="mstrip">
  <div class="mitem"><div class="mitem-name">Nifty 50</div><div class="mitem-price" id="p-nifty">--</div><div class="mitem-chg" id="c-nifty">--</div></div>
  <div class="mitem"><div class="mitem-name">Sensex</div><div class="mitem-price" id="p-sensex">--</div><div class="mitem-chg" id="c-sensex">--</div></div>
  <div class="mitem"><div class="mitem-name">Bank Nifty</div><div class="mitem-price" id="p-banknifty">--</div><div class="mitem-chg" id="c-banknifty">--</div></div>
  <div class="mitem"><div class="mitem-name">India VIX</div><div class="mitem-price" id="p-vix">--</div><div class="mitem-chg" id="c-vix">--</div></div>
</div>

<!-- QUICK PROMPTS -->
<div class="quick-wrap">
  <button class="qbtn" onclick="quickAsk('Good morning! Give me today\'s market briefing')">🌅 Morning Briefing</button>
  <button class="qbtn" onclick="quickAsk('What is Nifty doing right now? Should I buy or sell?')">📊 Nifty Signal</button>
  <button class="qbtn" onclick="quickAsk('Give me the best Nifty options trade for today with CE or PE, strike price, entry, stop loss and target')">🎯 Options Trade</button>
  <button class="qbtn" onclick="quickAsk('Which Nifty 50 stocks should I buy today for intraday trading?')">📈 Top Stock Picks</button>
  <button class="qbtn" onclick="quickAsk('Explain how to read RSI and MACD for intraday trading in simple words')">📚 Learn Trading</button>
  <button class="qbtn" onclick="quickAsk('What are the key support and resistance levels for Nifty today?')">🔑 Key Levels</button>
  <button class="qbtn" onclick="quickAsk('Is today good for options buying? Check VIX and market conditions')">⚡ Options Check</button>
  <button class="qbtn" onclick="quickAsk('Give me a complete risk management plan for a Rs.20000 trading capital')">💰 Risk Plan</button>
</div>

<!-- CHAT AREA -->
<div class="chat" id="chat"></div>

<div class="disclaimer">AI analysis only — not SEBI registered advice. Always verify on Angel One before trading.</div>

<!-- INPUT -->
<div class="input-wrap">
  <textarea class="input-box" id="inputBox" placeholder="Ask anything about trading..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="mic-btn" onclick="startVoice()" id="micBtn">🎤</button>
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
  </button>
</div>

<script>
// ── STATE ─────────────────────────────────────────────
var conversation = [];
var marketData = {nifty:null,sensex:null,banknifty:null,vix:null};
var isTyping = false;
var isLight = false;

// ── MARKET DATA ───────────────────────────────────────
async function fetchPrice(symbol){
  try{
    var url='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(symbol)+'?interval=1m&range=1d';
    var r=await fetch(url);if(!r.ok)return null;
    var d=await r.json();
    var meta=d.chart&&d.chart.result&&d.chart.result[0]&&d.chart.result[0].meta;
    if(!meta)return null;
    var ltp=parseFloat((meta.regularMarketPrice||meta.previousClose||0).toFixed(2));
    var prev=parseFloat((meta.previousClose||ltp).toFixed(2));
    return{ltp:ltp,chg:parseFloat((ltp-prev).toFixed(2)),chgPct:prev>0?parseFloat(((ltp-prev)/prev*100).toFixed(2)):0};
  }catch(e){return null;}
}

async function refreshPrices(){
  document.getElementById('statusTxt').textContent='Fetching live prices...';
  document.getElementById('liveBtn').textContent='⏳ Loading';
  var symbols={nifty:'^NSEI',sensex:'^BSESN',banknifty:'^NSEBANK',vix:'^INDIAVIX'};
  var keys=Object.keys(symbols);
  for(var k=0;k<keys.length;k++){
    var key=keys[k],q=await fetchPrice(symbols[key]);
    if(q&&q.ltp>0){
      marketData[key]=q;
      var prEl=document.getElementById('p-'+key),chEl=document.getElementById('c-'+key);
      if(prEl)prEl.textContent=q.ltp.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
      if(chEl){chEl.textContent=(q.chgPct>=0?'+':'')+q.chgPct.toFixed(2)+'%';chEl.className='mitem-chg '+(q.chgPct>=0?'up':'dn');}
    }
  }
  var anyLive=Object.values(marketData).some(function(v){return v!==null;});
  document.getElementById('statusTxt').textContent=anyLive?'Live prices loaded':'Using estimated data';
  document.getElementById('liveBtn').textContent='🔄 Live';
  // Auto refresh every 15 min
  setTimeout(refreshPrices,900000);
}

function getMarketSummary(){
  var n=marketData.nifty,s=marketData.sensex,bn=marketData.banknifty,v=marketData.vix;
  var parts=[];
  if(n)parts.push('Nifty 50: '+n.ltp.toLocaleString('en-IN')+' ('+(n.chgPct>=0?'+':'')+n.chgPct.toFixed(2)+'%)');
  if(s)parts.push('Sensex: '+s.ltp.toLocaleString('en-IN')+' ('+(s.chgPct>=0?'+':'')+s.chgPct.toFixed(2)+'%)');
  if(bn)parts.push('Bank Nifty: '+bn.ltp.toLocaleString('en-IN')+' ('+(bn.chgPct>=0?'+':'')+bn.chgPct.toFixed(2)+'%)');
  if(v)parts.push('India VIX: '+v.ltp.toFixed(1)+(v.ltp>18?' (HIGH - be careful)':v.ltp>14?' (moderate)':' (low - good for options buying)'));
  if(parts.length===0)return'Live prices not loaded yet (Yahoo Finance delayed). I will provide analysis based on typical market patterns.';
  return parts.join(' | ');
}

// ── CHAT ──────────────────────────────────────────────
function getTime(){
  return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

function addMessage(role,html,time){
  var chat=document.getElementById('chat');
  var isUser=role==='user';
  var div=document.createElement('div');
  div.className='msg '+(isUser?'user':'bot');
  var initials='U';
  try{initials=(localStorage.getItem('userName')||'U')[0].toUpperCase();}catch(e){}
  div.innerHTML='<div class="msg-avatar '+(isUser?'user':'bot')+'">'+(isUser?initials:'🤖')+'</div>'
    +'<div><div class="msg-bubble">'+html+'</div><div class="msg-time">'+(time||getTime())+'</div></div>';
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
  var chat=document.getElementById('chat');
  var div=document.createElement('div');
  div.className='msg bot';div.id='typingMsg';
  div.innerHTML='<div class="msg-avatar bot">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function hideTyping(){
  var el=document.getElementById('typingMsg');
  if(el)el.remove();
}

function formatResponse(text){
  // Convert markdown-like syntax to HTML
  text=text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
  text=text.replace(/\*(.*?)\*/g,'<i>$1</i>');
  text=text.replace(/`(.*?)`/g,'<span style="font-family:var(--mono);background:var(--card2);padding:1px 5px;border-radius:3px;font-size:12px">$1</span>');
  // Section headers
  text=text.replace(/#{2,3}\s*(.*?)(\n|$)/g,'<div class="section-title">$1</div>');
  // BUY/SELL/HOLD tags
  text=text.replace(/\bBUY\b/g,'<span class="tag-buy">BUY</span>');
  text=text.replace(/\bSELL\b/g,'<span class="tag-sell">SELL</span>');
  text=text.replace(/\bHOLD\b/g,'<span class="tag-hold">HOLD</span>');
  text=text.replace(/\bWAIT\b/g,'<span class="tag-hold">WAIT</span>');
  // Line breaks
  text=text.replace(/\n\n/g,'<br/><br/>');
  text=text.replace(/\n/g,'<br/>');
  // Bullet points
  text=text.replace(/^[•\-]\s(.+)$/gm,'<li>$1</li>');
  text=text.replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>');
  return text;
}

async function sendMessage(){
  var box=document.getElementById('inputBox');
  var text=box.value.trim();
  if(!text||isTyping)return;
  box.value='';autoResize(box);
  await processMessage(text);
}

async function quickAsk(text){
  if(isTyping)return;
  await processMessage(text);
}

async function processMessage(userText){
  isTyping=true;
  // Add user message
  addMessage('user',escapeHtml(userText));
  // Add to conversation
  conversation.push({role:'user',content:userText});
  // Show typing
  showTyping();
  document.getElementById('statusTxt').textContent='Thinking...';
  try{
    var reply=await callClaudeAPI(userText);
    hideTyping();
    addMessage('bot',formatResponse(reply));
    conversation.push({role:'assistant',content:reply});
    // Keep conversation to last 20 messages
    if(conversation.length>20)conversation=conversation.slice(-20);
  }catch(e){
    hideTyping();
    addMessage('bot','<span class="warn-inline">Sorry, I had trouble responding. Please try again.</span> (Error: '+e.message+')');
  }
  document.getElementById('statusTxt').textContent='Ready to help';
  isTyping=false;
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function callClaudeAPI(userMessage){
  var mktSummary=getMarketSummary();
  var now=new Date();
  var timeStr=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  var dateStr=now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var isMarketOpen=now.getHours()*60+now.getMinutes()>=555&&now.getHours()*60+now.getMinutes()<=930;

  var systemPrompt='You are TradeGuru AI, an expert Indian stock market trading assistant. You help traders with NSE/BSE intraday trading, Nifty options, and investment decisions.\n\n'
    +'CURRENT DATE & TIME: '+dateStr+', '+timeStr+' IST\n'
    +'MARKET STATUS: '+(isMarketOpen?'OPEN (9:15 AM - 3:30 PM)':'CLOSED')+'\n'
    +'LIVE MARKET DATA: '+mktSummary+'\n\n'
    +'YOUR EXPERTISE:\n'
    +'- Nifty 50, Sensex, Bank Nifty intraday analysis\n'
    +'- Options trading: CE/PE signals, strike selection, Greeks\n'
    +'- Technical analysis: RSI, MACD, Bollinger Bands, Support/Resistance\n'
    +'- Risk management: position sizing, stop loss, trailing stop\n'
    +'- Stock selection from Nifty 50 for intraday\n\n'
    +'RESPONSE STYLE:\n'
    +'- Be direct and specific. Give exact prices, strike prices, entry/exit levels.\n'
    +'- Use **bold** for important numbers and signals.\n'
    +'- Always include Stop Loss and Target for any trade suggestion.\n'
    +'- Use BUY, SELL, HOLD, WAIT as signal words.\n'
    +'- Keep responses focused and mobile-friendly (not too long).\n'
    +'- Always remind: verify on Angel One/Zerodha before trading.\n'
    +'- If market is closed, give analysis for next trading day.\n'
    +'- Use Indian Rupee (Rs.) for all prices.\n'
    +'- For options: always specify expiry (weekly Thursday), lot size (75 for Nifty), premium.\n\n'
    +'IMPORTANT: Always add a brief risk disclaimer at the end of trade suggestions.';

  var messages=[];
  // Add conversation history (last 8 messages for context)
  var history=conversation.slice(-8);
  for(var i=0;i<history.length-1;i++){messages.push(history[i]);}
  // Add current message with market context
  messages.push({role:'user',content:userMessage});

  var response=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system:systemPrompt,
      messages:messages
    })
  });

  if(!response.ok){
    var err=await response.json();
    throw new Error(err.error&&err.error.message?err.error.message:'API error '+response.status);
  }
  var data=await response.json();
  var fullText=data.content.map(function(b){return b.type==='text'?b.text:'';}).filter(Boolean).join('\n');
  return fullText;
}

// ── VOICE INPUT ───────────────────────────────────────
function startVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    alert('Voice not supported on this browser. Please type your question.');return;
  }
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var recognition=new SR();
  recognition.lang='en-IN';recognition.continuous=false;recognition.interimResults=false;
  var btn=document.getElementById('micBtn');
  btn.textContent='🔴';btn.style.background='var(--red2)';
  recognition.onresult=function(e){
    var text=e.results[0][0].transcript;
    document.getElementById('inputBox').value=text;
    btn.textContent='🎤';btn.style.background='var(--card2)';
    setTimeout(sendMessage,300);
  };
  recognition.onerror=function(){btn.textContent='🎤';btn.style.background='var(--card2)';};
  recognition.onend=function(){btn.textContent='🎤';btn.style.background='var(--card2)';};
  recognition.start();
}

// ── UI ────────────────────────────────────────────────
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function toggleTheme(){isLight=!isLight;document.body.className=isLight?'light':'';document.getElementById('themeBtn').textContent=isLight?'☀️':'🌙';}

// ── WELCOME MESSAGE ───────────────────────────────────
function showWelcome(){
  var now=new Date(),h=now.getHours();
  var greet=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  var isOpen=h*60+now.getMinutes()>=555&&h*60+now.getMinutes()<=930;
  var welcomeHtml='<b>Namaste! 🙏 I am TradeGuru AI</b><br/><br/>'
    +'Your personal AI trading assistant for NSE/BSE markets. I can help you with:<br/><br/>'
    +'<ul>'
